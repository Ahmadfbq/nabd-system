events {}

http {
  upstream user_service {
    server user-service:8081;
  }

  upstream analysis_service {
    server analysis-service:8082;
  }

  upstream notification_service {
    server notification-service:8083;
  }

  upstream health_data_service {
    server health-data-service:8084;
  }

  server {
    listen 80;

    location /api/user/ {
      proxy_pass http://user_service/;
    }

    location /api/analysis/ {
      proxy_pass http://analysis_service/;
    }

    location /api/notification/ {
      proxy_pass http://notification_service/;
    }

    location /api/health_data/ {
      proxy_pass http://health_data_service/;
    }

    location / {
      add_header 'Access-Control-Allow-Origin' '*';
      add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
      add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization';
    }
  }
}
