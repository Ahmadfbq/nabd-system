version: '3.8'
services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  user-service:
    build: ./user-service
    ports:
      - "8081:8081"
    depends_on:
      - rabbitmq

  analysis-service:
    build: ./analysis-service
    ports:
      - "8082:8082"
    depends_on:
      - rabbitmq

  notification-service:
    build: ./notification-service
    ports:
      - "8083:8083"
    depends_on:
      - rabbitmq

  health-data-service:
    build: ./health-data-service
    ports:
      - "8084:8084"
    depends_on:
      - rabbitmq

  spa-frontend:
    build: ./spa-frontend
    ports:
      - "5173:5173"  # default for Vite

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - user-service
      - analysis-service
      - notification-service
      - health-data-service
