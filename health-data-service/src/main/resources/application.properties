# Server port (unique per microservice)
server.port=8084

# Service name
spring.application.name=health-data-service

# Command Database Configuration (Write Model)
spring.datasource.command.url=jdbc:sqlite:health_data_command.db
spring.datasource.command.driver-class-name=org.sqlite.JDBC
spring.jpa.command.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.command.hibernate.ddl-auto=update
spring.jpa.command.properties.hibernate.dialect=org.hibernate.community.dialect.SQLiteDialect

# Query Database Configuration (Read Model)
spring.datasource.query.url=jdbc:sqlite:health_data_query.db
spring.datasource.query.driver-class-name=org.sqlite.JDBC
spring.jpa.query.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.query.hibernate.ddl-auto=update
spring.jpa.query.properties.hibernate.dialect=org.hibernate.community.dialect.SQLiteDialect

# RabbitMQ Configuration
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Queue Names
app.queue.measurement=measurement.queue

# Enable AMQP
spring.rabbitmq.template.mandatory=true

